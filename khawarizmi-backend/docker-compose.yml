

services:

  # ═══ BASE DE DONNÉES VECTORIELLE ═══════════════════
  db:
    image: pgvector/pgvector:pg17
    container_name: khawarizmi_db
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-khawarizmi_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB:-khawarizmi}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-khawarizmi_user} -d ${POSTGRES_DB:-khawarizmi}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ═══ CACHE + FILE D'ATTENTE CELERY ══════════════════
  redis:
    image: redis:7-alpine
    container_name: khawarizmi_redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ═══ BACKEND FASTAPI ════════════════════════════════
  backend:
    build:
      context: ..
      dockerfile: khawarizmi-backend/Dockerfile
    container_name: khawarizmi_backend
    env_file:
      - .env
    environment:
      DATA_DIR: "/app/data"
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-khawarizmi_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-khawarizmi}"
      REDIS_URL: "redis://redis:6379/0"
    ports:
      - "8000:8000"
    volumes:
      - ./services:/app/services
      - "C:/Users/zakaria/Documents/RESSOURCES_KHAWARIZMI/LIVRES SCOLAIRES:/app/ressources:ro"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ═══ WORKER CELERY (désactivé — la réconciliation tourne en asyncio dans le backend)
  # worker:
  #   build:
  #     context: ..
  #     dockerfile: Dockerfile
  #   container_name: khawarizmi_worker
  #   command: celery -A app.celery worker --loglevel=info
  #   env_file:
  #     - .env
  #   depends_on:
  #     db:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #   restart: unless-stopped

volumes:
  postgres_data:
    driver: local
