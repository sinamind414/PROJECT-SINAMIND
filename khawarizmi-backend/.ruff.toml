# .ruff.toml — Khawarizmi Pro (Backend Python)
target-version = "py312"
line-length = 120
exclude = ["migrations/versions/*", "__pycache__", ".venv", "node_modules"]

[format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"

[lint]
select = [
    "F",    # Pyflakes : erreurs logiques
    "E",    # Pycodestyle : conventions PEP 8
    "W",    # Pycodestyle : avertissements
    "I",    # Isort : ordre des imports
    "N",    # Naming : conventions de nommage
    "UP",   # Pyupgrade : modernisation Python 3.12
    "B",    # Bugbear : bugs potentiels
    "SIM",  # Simplicité : code simplifiable
    "C4",   # Compréhension : list/set/dict comprehensions
    "RUF",  # Règles spécifiques Ruff
]
ignore = [
    "E501",    # ligne trop longue (géré par formateur)
    "E741",    # noms vague (i, j, k) — acceptable
    "N802",    # noms fonctions en lower_case — accepté
    "N803",    # noms arguments en lower_case — accepté
    "B008",    # FastAPI Depends() dans les defaults — pattern standard
    "RUF001",  # caractères unicode ambigus — arabe intentionnel
    "E402",    # imports après init app — nécessaire pour FastAPI
    "E701",    # multi-statement sur une ligne — décorateurs FastAPI
    "RUF029",  # async inutilisé — nécessaire pour les endpoints async
]
fixable = ["ALL"]
unfixable = []
preview = true

[lint.per-file-ignores]
# Routes : raise-without-from dans les except HTTP (pattern FastAPI standard)
"deps.py" = ["B904"]
"routes/auth.py" = ["B904"]
"routes/chat.py" = ["B904"]
"routes/cours.py" = ["B904"]
"routes/mindmap.py" = ["B904"]
"routes/payment.py" = ["B904"]
"services/khawarizmi_engine.py" = ["B904"]
# Lifespan : yield sans catch (pattern FastAPI standard)
"routes/lifespan.py" = ["RUF075"]
# Document analysis : signe × intentionnel dans docstring
"routes/document_analysis.py" = ["RUF002"]
# Schemas Pydantic : camelCase pour compatibilité JSON/Frontend
"schemas/action_verb.py" = ["N815"]
# Scripts OCR : convention matrix M, easyocr import conditionnel, undefined vars legacy
"scripts/ocr_khelifa_pipeline.py" = ["N806", "F821"]
"scripts/ocr_pipeline.py" = ["N806"]
"scripts/run_khelifa_pipeline_local.py" = ["N806", "F821"]
"scripts/ocr/batch_final.py" = ["SIM115"]
"scripts/precompute_embeddings.py" = ["B007"]
"scripts/seed_action_verbs.py" = ["RUF100"]
# Services : constantes BATCH_ en uppercase dans worker (convention)
"services/reconciliation_queue.py" = ["N806"]
"services/interleaving.py" = ["RUF003"]
"services/eval_calibration.py" = ["SIM108"]
# Tests : float equality dans assertions FSRS, autouse fixtures, useless if-else
"tests/test_evaluate_full.py" = ["RUF069"]
"tests/conftest.py" = ["RUF034", "RUF076"]
"tests/test_payment.py" = ["RUF076"]
