name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: khawarizmi_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('khawarizmi-backend/requirements.txt') }}

      - name: Install dependencies
        run: |
          cd khawarizmi-backend
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run backend tests
        env:
          SECRET_KEY: ci-test-key-for-smoke-tests-only
          DATABASE_URL: postgresql+asyncpg://postgres:test@localhost/khawarizmi_test
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: ci
          GEMINI_API_KEY: test
        run: |
          cd khawarizmi-backend
          pytest tests/ -v --timeout=30 -x

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('khawarizmi-frontend/package-lock.json') }}

      - name: Install dependencies
        run: |
          cd khawarizmi-frontend
          npm ci

      - name: Run lint
        run: |
          cd khawarizmi-frontend
          npm run lint

  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: |
          cd khawarizmi-backend
          docker build -t khawarizmi-backend:latest .

      - name: Run backend smoke test
        run: |
          docker run --rm \
            -e SECRET_KEY=ci-test-key-for-smoke-tests-only \
            -e DATABASE_URL=postgresql+asyncpg://postgres:test@localhost/khawarizmi_test \
            -e ENVIRONMENT=ci \
            -e REDIS_URL=redis://localhost:6379/0 \
            khawarizmi-backend:latest \
            python -c "from config import get_settings; print('✅ Settings OK')"
