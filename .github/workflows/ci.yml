name: CI/CD Khawarizmi Pro

on:
  push:
    branches: [main, fabuleux/*]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test
          POSTGRES_DB: khawarizmi_test
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          cd khawarizmi-backend
          pip install -r requirements.txt

      - name: Run backend smoke test
        run: |
          cd khawarizmi-backend
          python -c "
import os
os.environ['SECRET_KEY'] = 'ci-test-key-for-smoke-tests-only'
os.environ['DATABASE_URL'] = 'postgresql+asyncpg://postgres:test@localhost/khawarizmi_test'
os.environ['ENVIRONMENT'] = 'ci'
os.environ['REDIS_URL'] = 'redis://localhost:6379/0'
os.environ['GEMINI_API_KEY'] = 'test'
os.environ['OPENAI_API_KEY'] = 'test'
from config import get_settings
cfg = get_settings()
print(f'  Settings OK - SECRET_KEY: {bool(cfg.SECRET_KEY)}')
print(f'  DATABASE_URL: {cfg.DATABASE_URL}')
print(f'  ENVIRONMENT: {cfg.ENVIRONMENT}')
"

      - name: Run Methodology tests
        run: |
          cd khawarizmi-backend
          pip install pytest pytest-asyncio httpx
          pytest tests/test_methodology*.py tests/test_diagnostic.py tests/test_couche3.py tests/test_tutor.py tests/test_bac_blanc_intelligent.py tests/test_mindmap_methodology.py -v --tb=short
