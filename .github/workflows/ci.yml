name: Khawarizmi Pro — CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"
  POSTGRES_DB: khawarizmi_test
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: testpass_ci_2026
  BACKEND_DIR: khawarizmi-backend
  FRONTEND_DIR: khawarizmi-frontend

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security:
    name: Securite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: TruffleHog — scan secrets
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --results=verified,unknown --debug
      - name: Verifier .gitignore UTF-8
        run: file --mime-encoding .gitignore | grep -v utf-16 || (echo ".gitignore pas en UTF-8" && exit 1)
      - name: Verifier .env non commite
        run: |
          if git ls-files | grep -E "^\.env$|^.*/\.env$"; then
            echo "Fichier .env commite detecte"; exit 1
          fi

  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-latest
    needs: security
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: ${{ env.BACKEND_DIR }}/requirements.txt
      - name: Installer dependances
        working-directory: ${{ env.BACKEND_DIR }}
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt ruff
      - name: Ruff check
        working-directory: ${{ env.BACKEND_DIR }}
        run: ruff check . --output-format=github
      - name: Ruff format (dry-run)
        working-directory: ${{ env.BACKEND_DIR }}
        run: ruff format --check .
      - name: Verifier taille main.py
        working-directory: ${{ env.BACKEND_DIR }}
        run: |
          LINES=$(wc -l < main.py)
          echo "main.py: $LINES lignes"
          if [ $LINES -gt 110 ]; then
            echo "main.py depasse 110 lignes ($LINES)"; exit 1
          fi

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    needs: security
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.FRONTEND_DIR }}/package-lock.json
      - name: Installer dependances
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm ci
      - name: ESLint
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm run lint || npx eslint .

  typecheck-backend:
    name: Typecheck Backend
    runs-on: ubuntu-latest
    needs: lint-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: ${{ env.BACKEND_DIR }}/requirements.txt
      - name: Installer dependances
        working-directory: ${{ env.BACKEND_DIR }}
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt mypy
      - name: mypy
        working-directory: ${{ env.BACKEND_DIR }}
        run: mypy . --ignore-missing-imports --warn-unused-ignores || true

  typecheck-frontend:
    name: Typecheck Frontend
    runs-on: ubuntu-latest
    needs: lint-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.FRONTEND_DIR }}/package-lock.json
      - name: Installer dependances
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm ci
      - name: tsc --noEmit
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npx tsc --noEmit || true

  test-backend:
    name: Tests Backend
    runs-on: ubuntu-latest
    needs: [typecheck-backend, typecheck-frontend]
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: ${{ env.BACKEND_DIR }}/requirements.txt
      - name: Installer dependances
        working-directory: ${{ env.BACKEND_DIR }}
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Migrations Alembic
        working-directory: ${{ env.BACKEND_DIR }}
        env:
          DATABASE_URL: postgresql+asyncpg://${{ env.POSTGRES_USER }}:${{ env.POSTGRES_PASSWORD }}@localhost/${{ env.POSTGRES_DB }}
          SECRET_KEY: ci-test-secret-key-khawarizmi-2026
          REDIS_URL: redis://localhost:6379/1
          ENVIRONMENT: test
        run: alembic upgrade head
      - name: Pytest avec couverture
        working-directory: ${{ env.BACKEND_DIR }}
        env:
          DATABASE_URL: postgresql+asyncpg://${{ env.POSTGRES_USER }}:${{ env.POSTGRES_PASSWORD }}@localhost/${{ env.POSTGRES_DB }}
          SECRET_KEY: ci-test-secret-key-khawarizmi-2026
          REDIS_URL: redis://localhost:6379/1
          ENVIRONMENT: test
        run: |
          pytest tests/ \
            --asyncio-mode=auto \
            --cov=. \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=40 \
            -v --tb=short

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: test-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.FRONTEND_DIR }}/package-lock.json
      - name: Installer dependances
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm ci
      - name: next build
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  docker-backend:
    name: Docker Backend
    runs-on: ubuntu-latest
    needs: test-backend
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        working-directory: ${{ env.BACKEND_DIR }}
        run: |
          docker build \
            -t khawarizmi-backend:${{ github.sha }} \
            -f Dockerfile \
            .
      - name: Smoke test — import
        run: |
          docker run --rm khawarizmi-backend:${{ github.sha }} \
            python -c "from main import app; print(f'Routes: {len(app.routes)}')"

  docker-frontend:
    name: Docker Frontend
    runs-on: ubuntu-latest
    needs: build-frontend
    steps:
      - uses: actions/checkout@v4
      - name: Verifier Dockerfile frontend
        working-directory: ${{ env.FRONTEND_DIR }}
        run: |
          if [ -f Dockerfile ]; then
            docker build -t khawarizmi-frontend:${{ github.sha }} .
            echo "Frontend Docker image built"
          else
            echo "Pas de Dockerfile frontend — skip"
          fi

  deploy:
    name: Deploiement Production
    runs-on: ubuntu-latest
    needs: [docker-backend, docker-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://khawarizmi-backend.railway.app
    steps:
      - uses: actions/checkout@v4
      - name: Installer Railway CLI
        run: npm install -g @railway/cli
      - name: Deployer sur Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service khawarizmi-backend --detach
      - name: Verifier le deploiement
        run: |
          sleep 30
          curl -f --retry 3 --retry-delay 10 https://khawarizmi-backend.railway.app/health

  summary:
    name: Resume
    runs-on: ubuntu-latest
    needs: [security, lint-backend, lint-frontend, test-backend, docker-backend]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: Generer le resume
        run: |
          cat <<'EOF' >> $GITHUB_STEP_SUMMARY
          # Khawarizmi Pro — Rapport CI

          | Job | Statut |
          |---|---|
          | Securite | ${{ needs.security.result }} |
          | Lint Backend | ${{ needs.lint-backend.result }} |
          | Lint Frontend | ${{ needs.lint-frontend.result }} |
          | Typecheck Backend | ${{ needs.typecheck-backend.result }} |
          | Typecheck Frontend | ${{ needs.typecheck-frontend.result }} |
          | Tests Backend | ${{ needs.test-backend.result }} |
          | Build Frontend | ${{ needs.build-frontend.result }} |
          | Docker Backend | ${{ needs.docker-backend.result }} |
          | Docker Frontend | ${{ needs.docker-frontend.result }} |
          | Deploy | ${{ needs.deploy.result }} |

          Commit: ${{ github.sha }}
          Branche: ${{ github.ref_name }}
          EOF
