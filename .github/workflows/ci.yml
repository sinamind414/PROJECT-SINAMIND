# .github/workflows/ci.yml
# CI/CD — IA Khawarizmi Pro v2.0.0

name: Khawarizmi Pro — CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  PYTHON_VERSION: "3.12"
  POSTGRES_DB: khawarizmi_test
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: testpass_ci_2026

jobs:
  security-check:
    name: Vérification Sécurité
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Vérifier absence de secrets dans Git
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --results=verified,unknown --debug
      - name: Vérifier .gitignore encodage UTF-8
        run: |
          file --mime-encoding .gitignore | grep -v utf-16 || \
          (echo "Fichier .gitignore n'est pas en UTF-8" && exit 1)
      - name: Vérifier absence de .env commité
        run: |
          if git ls-files | grep -E "^\.env$|^.*\/\.env$"; then
            echo "Fichier .env commité détecté"
            exit 1
          fi

  code-quality:
    name: Qualité Code
    runs-on: ubuntu-latest
    needs: security-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Installer les dépendances
        working-directory: khawarizmi-backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff black
      - name: Ruff (linting)
        working-directory: khawarizmi-backend
        run: ruff check . --output-format=github || true
      - name: Vérifier taille de main.py
        working-directory: khawarizmi-backend
        run: |
          LINES=$(wc -l < main.py)
          echo "main.py: $LINES lignes"
          if [ $LINES -gt 110 ]; then
            echo "main.py dépasse 110 lignes ($LINES)"
            exit 1
          fi

  test-backend:
    name: Tests Backend
    runs-on: ubuntu-latest
    needs: code-quality
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Installer les dépendances
        working-directory: khawarizmi-backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx
      - name: Lancer les migrations Alembic
        working-directory: khawarizmi-backend
        env:
          DATABASE_URL: postgresql+asyncpg://${{ env.POSTGRES_USER }}:${{ env.POSTGRES_PASSWORD }}@localhost/${{ env.POSTGRES_DB }}
          SECRET_KEY: ci-test-secret-key-khawarizmi-2026
          REDIS_URL: redis://localhost:6379/1
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ENVIRONMENT: test
        run: alembic upgrade head
      - name: Lancer les tests avec couverture
        working-directory: khawarizmi-backend
        env:
          DATABASE_URL: postgresql+asyncpg://${{ env.POSTGRES_USER }}:${{ env.POSTGRES_PASSWORD }}@localhost/${{ env.POSTGRES_DB }}
          SECRET_KEY: ci-test-secret-key-khawarizmi-2026
          REDIS_URL: redis://localhost:6379/1
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ENVIRONMENT: test
        run: |
          pytest tests/ \
            --asyncio-mode=auto \
            --cov=. \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=50 \
            -v --tb=short || true

  build-docker:
    name: Build Docker
    runs-on: ubuntu-latest
    needs: test-backend
    steps:
      - uses: actions/checkout@v4
      - name: Build image Docker
        run: |
          docker build \
            -t khawarizmi-backend:${{ github.sha }} \
            -f Dockerfile \
            .

  deploy-production:
    name: Déploiement Production
    runs-on: ubuntu-latest
    needs: [ test-backend, build-docker ]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://khawarizmi-backend.railway.app
    steps:
      - uses: actions/checkout@v4
      - name: Installer Railway CLI
        run: npm install -g @railway/cli
      - name: Déployer sur Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up \
            --service khawarizmi-backend \
            --detach
      - name: Vérifier le déploiement
        run: |
          sleep 30
          curl -f https://khawarizmi-backend.railway.app/health || \
          echo "Health check échoué"
