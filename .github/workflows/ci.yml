name: CI

on:
  push:
    branches: [old_main, "fix/*", "test/*", "feat/*"]
  pull_request:
    branches: [old_main]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"

jobs:
  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: khawarizmi
          POSTGRES_PASSWORD: khawarizmi_pass
          POSTGRES_DB: khawarizmi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U khawarizmi"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: khawarizmi-backend

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -q --tb=short
        env:
          DATABASE_URL: postgresql+asyncpg://khawarizmi:khawarizmi_pass@localhost:5432/khawarizmi_test
          SECRET_KEY: ci-test-secret-key-not-for-production
          REDIS_URL: redis://localhost:6379/0
          GEMINI_API_KEY: ci-skip
          OPENAI_API_KEY: ci-skip
          SENTRY_DSN: ""
          ENV: test

  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: khawarizmi-frontend

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: khawarizmi-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  e2e-smoke:
    needs: [test-backend, build-frontend]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: khawarizmi
          POSTGRES_PASSWORD: khawarizmi_pass
          POSTGRES_DB: khawarizmi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U khawarizmi"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://khawarizmi:khawarizmi_pass@localhost:5432/khawarizmi_test
      SECRET_KEY: ci-e2e-secret-key-not-for-production
      REDIS_URL: redis://localhost:6379/0
      GEMINI_API_KEY: ci-skip
      OPENAI_API_KEY: ci-skip
      SENTRY_DSN: ""
      ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: khawarizmi-backend/requirements.txt

      - name: Install backend deps
        run: pip install -r requirements.txt
        working-directory: khawarizmi-backend

      - name: Run migrations
        run: alembic upgrade head
        working-directory: khawarizmi-backend

      - name: Seed dev data
        run: python scripts/seed_dev.py
        working-directory: khawarizmi-backend

      - name: Start backend
        run: |
          uvicorn main:app --host 0.0.0.0 --port 8000 &
          sleep 3
          curl --retry 5 --retry-delay 2 --retry-connrefused http://localhost:8000/health
        working-directory: khawarizmi-backend

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: khawarizmi-frontend/package-lock.json

      - name: Install frontend deps
        run: npm ci
        working-directory: khawarizmi-frontend

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: khawarizmi-frontend

      - name: Build frontend
        run: npm run build
        working-directory: khawarizmi-frontend

      - name: Start frontend
        run: |
          npm run start &
          sleep 3
          curl --retry 5 --retry-delay 2 --retry-connrefused http://localhost:3000
        working-directory: khawarizmi-frontend

      - name: Run E2E smoke tests
        run: npx playwright test
        working-directory: khawarizmi-frontend
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          NEXT_PUBLIC_API_URL: http://localhost:8000
          PW_SKIP_WEBSERVER: "1"

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: khawarizmi-frontend/test-results/
