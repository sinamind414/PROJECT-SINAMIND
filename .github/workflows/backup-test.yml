name: Khawarizmi Pro — Backup Validation

on:
  schedule:
    - cron: "0 5 * * 1"        # Chaque lundi 05:00 UTC
  push:
    paths:
      - "scripts/backup.sh"
      - "scripts/restore.sh"
      - ".github/workflows/backup-test.yml"
  workflow_dispatch:

env:
  POSTGRES_DB: khawarizmi_test
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: testpass_ci_2026
  BACKUP_DIR: /tmp/khawarizmi_backup_test

jobs:
  validate-backup-scripts:
    name: Validation scripts backup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Analyser backup.sh avec shellcheck
        run: |
          shellcheck scripts/backup.sh || true  # Non-bloquant
          echo "✅ Syntaxe backup.sh OK"
      
      - name: Analyser restore.sh avec shellcheck
        run: |
          shellcheck scripts/restore.sh || true
          echo "✅ Syntaxe restore.sh OK"
      
      - name: Vérifier que backup.sh est exécutable
        run: |
          chmod +x scripts/backup.sh
          test -x scripts/backup.sh && echo "✅ backup.sh exécutable"
      
      - name: Vérifier la lisibilité du README-backup
        run: |
          test -f scripts/README-backup.md && echo "✅ README-backup.md présent"
          wc -l scripts/README-backup.md

  test-backup-roundtrip:
    name: Backup/Restore round-trip
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Initialiser la base de test
        run: |
          PGPASSWORD=$POSTGRES_PASSWORD psql -h localhost -U $POSTGRES_USER -d $POSTGRES_DB -c "
            CREATE TABLE IF NOT EXISTS test_backup (id SERIAL PRIMARY KEY, val TEXT);
            INSERT INTO test_backup (val) VALUES ('backup-test-' || NOW()::text);
          "
          echo "✅ Base initialisée"
      
      - name: Executer backup.sh
        run: |
          chmod +x scripts/backup.sh
          export DATABASE_URL="postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@localhost:5432/${POSTGRES_DB}"
          export BACKUP_DIR="${BACKUP_DIR}"
          mkdir -p "${BACKUP_DIR}"
          bash scripts/backup.sh --local
          echo "✅ Backup exécuté"
      
      - name: Vérifier le fichier backup
        run: |
          ls -la "${BACKUP_DIR}"/*.sql.gz
          BACKUP_FILE=$(ls "${BACKUP_DIR}"/*.sql.gz | head -1)
          echo "Fichier: $BACKUP_FILE"
          file "$BACKUP_FILE"
          SIZE=$(stat -c%s "$BACKUP_FILE")
          echo "Taille: $SIZE bytes"
          test "$SIZE" -gt 100 && echo "✅ Backup non vide"
      
      - name: Vérifier que restore.sh peut lire le backup
        run: |
          chmod +x scripts/restore.sh
          BACKUP_FILE=$(ls "${BACKUP_DIR}"/*.sql.gz | head -1)
          echo "Test: gunzip -c integrity check"
          gunzip -t "$BACKUP_FILE" && echo "✅ Archive integrity OK"
      
      - name: Nettoyer
        run: |
          rm -rf "${BACKUP_DIR}"
          echo "✅ Nettoyage terminé"

  backup-schema-validation:
    name: Validation SQL via Alembic
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      
      - name: Installer dépendances
        working-directory: ${{ env.BACKEND_DIR }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt 2>&1 | tail -5
      
      - name: Appliquer les migrations Alembic
        working-directory: ${{ env.BACKEND_DIR }}
        env:
          DATABASE_URL: postgresql+asyncpg://${{ env.POSTGRES_USER }}:${{ env.POSTGRES_PASSWORD }}@localhost:5432/${{ env.POSTGRES_DB }}
          SECRET_KEY: ci-secret-key-for-backup-test-2026
          ENVIRONMENT: test
        run: |
          alembic upgrade head
          echo "✅ Migrations appliquées"
      
      - name: Backup de la base migrée
        run: |
          export DATABASE_URL="postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@localhost:5432/${POSTGRES_DB}"
          export BACKUP_DIR="${BACKUP_DIR}"
          mkdir -p "${BACKUP_DIR}"
          bash scripts/backup.sh --local
          echo "✅ Backup post-migration"
          ls -la "${BACKUP_DIR}"/*.sql.gz

      - name: Nettoyer
        run: |
          rm -rf "${BACKUP_DIR}"
