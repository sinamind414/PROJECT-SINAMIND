<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نسيت كلمة المرور | خوارزمي IA</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&family=Cairo:wght@600;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>

<div class="auth-container">
  <div class="auth-decoration">
    <div class="auth-decoration-content">
      <a href="index.html" class="auth-logo">
        <img src="assets/logo.png" alt="خوارزمي IA">
      </a>
      <div class="auth-welcome">
        <h2>لا تقلق! 🔐</h2>
        <p>سنرسل لك رابطاً لإعادة تعيين كلمة المرور على بريدك الإلكتروني.</p>
        <ul class="auth-features-list">
          <li class="auth-feature-item">
            <span class="feature-icon">📧</span>
            <span>تحقق من بريدك الإلكتروني</span>
          </li>
          <li class="auth-feature-item">
            <span class="feature-icon">🔗</span>
            <span>اضغط على الرابط المرسل</span>
          </li>
          <li class="auth-feature-item">
            <span class="feature-icon">🔑</span>
            <span>أنشئ كلمة مرور جديدة</span>
          </li>
        </ul>
      </div>
    </div>
  </div>

  <div class="auth-form-panel">
    <div class="auth-form-header">
      <h1>🔐 إعادة تعيين كلمة المرور</h1>
      <p>أدخل بريدك الإلكتروني وسنرسل لك رابط الإعادة</p>
    </div>

    <div id="messageBox" class="message-box" style="display: none;"></div>

    <form id="resetForm" class="auth-form">
      <div class="form-group">
        <label class="form-label">البريد الإلكتروني <span class="required">*</span></label>
        <div class="input-wrapper">
          <input type="email" id="email" class="form-input" placeholder="exemple@gmail.com" required dir="ltr" style="text-align: left;">
          <span class="input-icon">📧</span>
        </div>
      </div>

      <button type="submit" class="btn-submit" id="submitBtn">
        <span class="btn-text">إرسال رابط الإعادة 📤</span>
        <span class="spinner"></span>
      </button>

      <div class="auth-alt-link">
        <p>تذكرت كلمة المرور؟ <a href="connexion.html">تسجيل الدخول →</a></p>
      </div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="js/auth-supabase.js"></script>
<script>
  function showMessage(type, text) {
    const box = document.getElementById('messageBox');
    box.className = `message-box ${type}`;
    const icons = { success: '✅', error: '❌', info: 'ℹ️' };
    box.innerHTML = `<span class="message-icon">${icons[type]}</span><span>${text}</span>`;
    box.style.display = 'flex';
  }

  document.getElementById('resetForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    btn.classList.add('loading');
    btn.disabled = true;

    const email = document.getElementById('email').value.trim();
    const result = await AuthSupabase.resetPassword(email);

    if (result.success) {
      showMessage('success', result.message + ' 📧');
      document.getElementById('email').value = '';
    } else {
      showMessage('error', result.error);
    }

    btn.classList.remove('loading');
    btn.disabled = false;
  });
</script>

</body>
</html>
