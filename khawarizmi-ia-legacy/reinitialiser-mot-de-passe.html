<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>كلمة مرور جديدة | خوارزمي IA</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&family=Cairo:wght@600;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>

<div class="auth-container">
  <div class="auth-decoration">
    <div class="auth-decoration-content">
      <a href="index.html" class="auth-logo">
        <img src="assets/logo.png" alt="خوارزمي IA">
      </a>
      <div class="auth-welcome">
        <h2>أنشئ كلمة مرور جديدة 🔑</h2>
        <p>اختر كلمة مرور قوية لحماية حسابك.</p>
      </div>
    </div>
  </div>

  <div class="auth-form-panel">
    <div class="auth-form-header">
      <h1>🔑 كلمة مرور جديدة</h1>
      <p>أدخل كلمة المرور الجديدة</p>
    </div>

    <div id="messageBox" class="message-box" style="display: none;"></div>

    <form id="updateForm" class="auth-form">
      <div class="form-group">
        <label class="form-label">كلمة المرور الجديدة <span class="required">*</span></label>
        <div class="input-wrapper">
          <input type="password" id="newPassword" class="form-input" placeholder="••••••••" required minlength="8" dir="ltr" style="text-align: left; padding-left: 44px;">
          <button type="button" class="password-toggle" onclick="togglePassword('newPassword', this)">👁️</button>
        </div>
        <div class="password-strength">
          <div class="strength-bars">
            <div class="strength-bar" id="bar1"></div>
            <div class="strength-bar" id="bar2"></div>
            <div class="strength-bar" id="bar3"></div>
            <div class="strength-bar" id="bar4"></div>
          </div>
          <span class="strength-text" id="strengthText">8 أحرف على الأقل</span>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">تأكيد كلمة المرور <span class="required">*</span></label>
        <div class="input-wrapper">
          <input type="password" id="confirmPassword" class="form-input" placeholder="••••••••" required dir="ltr" style="text-align: left; padding-left: 44px;">
          <button type="button" class="password-toggle" onclick="togglePassword('confirmPassword', this)">👁️</button>
        </div>
      </div>

      <button type="submit" class="btn-submit" id="submitBtn">
        <span class="btn-text">تحديث كلمة المرور ✓</span>
        <span class="spinner"></span>
      </button>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="js/auth-supabase.js"></script>
<script>
  function togglePassword(id, btn) {
    const field = document.getElementById(id);
    field.type = field.type === 'password' ? 'text' : 'password';
    btn.textContent = field.type === 'password' ? '👁️' : '🙈';
  }

  function showMessage(type, text) {
    const box = document.getElementById('messageBox');
    box.className = `message-box ${type}`;
    const icons = { success: '✅', error: '❌' };
    box.innerHTML = `<span class="message-icon">${icons[type]}</span><span>${text}</span>`;
    box.style.display = 'flex';
  }

  document.getElementById('newPassword').addEventListener('input', (e) => {
    const password = e.target.value;
    let strength = 0;
    if (password.length >= 8) strength++;
    if (password.length >= 12) strength++;
    if (/[A-Z]/.test(password) && /[a-z]/.test(password)) strength++;
    if (/[0-9]/.test(password)) strength++;

    const bars = [document.getElementById('bar1'), document.getElementById('bar2'), document.getElementById('bar3'), document.getElementById('bar4')];
    bars.forEach((bar, i) => {
      bar.className = 'strength-bar';
      if (i < strength) bar.classList.add(`active-${strength}`);
    });
  });

  document.getElementById('updateForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    btn.classList.add('loading');
    btn.disabled = true;

    const newPassword = document.getElementById('newPassword').value;
    const confirmPassword = document.getElementById('confirmPassword').value;

    if (newPassword !== confirmPassword) {
      showMessage('error', 'كلمات المرور غير متطابقة');
      btn.classList.remove('loading');
      btn.disabled = false;
      return;
    }

    if (newPassword.length < 8) {
      showMessage('error', 'كلمة المرور يجب أن تحتوي على 8 أحرف على الأقل');
      btn.classList.remove('loading');
      btn.disabled = false;
      return;
    }

    const result = await AuthSupabase.updatePassword(newPassword);

    if (result.success) {
      showMessage('success', result.message + ' جاري التوجيه...');
      setTimeout(() => window.location.href = 'mon-compte.html', 2000);
    } else {
      showMessage('error', result.error);
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  });
</script>

</body>
</html>
