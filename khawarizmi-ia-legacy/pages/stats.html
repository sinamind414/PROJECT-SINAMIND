<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إحصائياتي | خوارزمي IA</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tajawal', sans-serif; background: #FAF8F0; padding: 40px 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: white; border-radius: 24px; padding: 40px; box-shadow: 0 12px 40px rgba(0,0,0,0.1); }
        h1 { color: #C9A961; margin-bottom: 30px; font-family: 'Cairo', sans-serif; font-size: 2rem; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: #1A2942; color: white; padding: 24px; border-radius: 16px; text-align: center; }
        .stat-number { font-size: 2.5rem; font-weight: 800; color: #C9A961; font-family: 'Cairo', sans-serif; }
        .stat-label { margin-top: 8px; opacity: 0.8; }
        h2 { color: #1A2942; margin: 30px 0 16px; font-family: 'Cairo', sans-serif; }
        .achievements-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; margin-top: 16px; }
        .ach-card { padding: 16px; border-radius: 12px; text-align: center; }
        .ach-card.unlocked { background: linear-gradient(135deg, #FFD700, #FFA500); color: #1A2942; }
        .ach-card.locked { background: #E8E8E8; opacity: 0.5; color: #5A6A7A; }
        .ach-name { font-size: 1.2rem; margin-bottom: 6px; font-weight: 700; }
        .ach-desc { font-size: 0.85rem; }
        .topics-list { display: flex; flex-direction: column; gap: 12px; margin-top: 16px; }
        .topic-row { display: flex; align-items: center; gap: 16px; padding: 12px 16px; background: #FAFAFA; border-radius: 12px; }
        .topic-name { flex: 1; font-weight: 700; }
        .topic-bar { flex: 2; height: 10px; background: #E8E8E8; border-radius: 5px; overflow: hidden; }
        .topic-fill { height: 100%; border-radius: 5px; transition: width 0.6s; }
        .topic-pct { font-weight: 700; min-width: 45px; text-align: left; }
        .btn-group { margin-top: 30px; padding: 20px; background: #FAFAFA; border-radius: 12px; text-align: center; }
        .btn { padding: 12px 24px; border: none; border-radius: 10px; cursor: pointer; font-family: 'Tajawal', sans-serif; font-weight: 700; font-size: 0.95rem; transition: all 0.3s; }
        .btn:hover { transform: translateY(-2px); }
        .btn-gold { background: #C9A961; color: white; }
        .btn-red { background: #DC2626; color: white; margin-right: 10px; }
        .btn-blue { background: #2563EB; color: white; margin-right: 10px; }
        .back-link { display: inline-block; margin-top: 20px; color: #C9A961; text-decoration: none; font-weight: 700; }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="container">
    <h1>📊 إحصائياتي التفصيلية</h1>
    <div id="statsContent">
        <p style="text-align:center;color:#5A6A7A;">جاري تحميل الإحصائيات...</p>
    </div>
    <a href="../index.html" class="back-link">← العودة للرئيسية</a>
</div>
<script src="../js/learning-stats.js"></script>
<script>
function getTopicName(t) {
    const names = { transcription:'🧬 الاستنساخ', traduction:'🔄 الترجمة', immunite:'🛡️ المناعة', photosynthese:'☀️ التركيب الضوئي', respiration:'🔋 التنفس الخلوي', adn:'🧬 ADN', enzymes:'⚗️ الإنزيمات', communication_nerveuse:'⚡ العصبونات' };
    return names[t] || t;
}
function getColor(pct) {
    if (pct >= 80) return '#10B981';
    if (pct >= 50) return '#F59E0B';
    return '#DC2626';
}
function displayStats() {
    const stats = LearningStats.getStats();
    const summary = LearningStats.getSummary();
    const achievements = LearningStats.getUnlockedAchievements();
    const topics = Object.entries(stats.topicsStudied).sort((a,b) => b[1].masteryLevel - a[1].masteryLevel);
    const unlocked = achievements.filter(a => a.unlocked);
    const locked = achievements.filter(a => !a.unlocked);
    const startDate = stats.startDate ? new Date(stats.startDate).toLocaleDateString('ar-DZ') : '—';
    document.getElementById('statsContent').innerHTML = `
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number">${summary.totalQuestions}</div>
                <div class="stat-label">أسئلة مطروحة</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">${summary.topicsExplored}</div>
                <div class="stat-label">مواضيع مستكشفة</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">${summary.topicsMastered}</div>
                <div class="stat-label">مواضيع متقنة</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">${summary.successRate}%</div>
                <div class="stat-label">معدل النجاح</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">${summary.streakDays} 🔥</div>
                <div class="stat-label">أيام متتالية</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">${summary.achievementsUnlocked}</div>
                <div class="stat-label">إنجازات</div>
            </div>
        </div>
        <p style="color:#5A6A7A;margin-bottom:20px;">📅 بدأت التعلم في: ${startDate}</p>
        <h2>📚 المواضيع المدروسة (${topics.length})</h2>
        <div class="topics-list">
            ${topics.length > 0 ? topics.map(([key, data]) => `
                <div class="topic-row">
                    <div class="topic-name">${getTopicName(key)}</div>
                    <div class="topic-bar"><div class="topic-fill" style="width:${data.masteryLevel}%;background:${getColor(data.masteryLevel)};"></div></div>
                    <div class="topic-pct" style="color:${getColor(data.masteryLevel)};">${data.masteryLevel}%</div>
                </div>
            `).join('') : '<p style="color:#5A6A7A;">لم تدرس أي موضوع بعد. ابدأ محادثة مع أستاذ خوارزمي!</p>'}
        </div>
        <h2>🏆 الإنجازات (${unlocked.length}/${achievements.length})</h2>
        <div class="achievements-grid">
            ${unlocked.map(a => `
                <div class="ach-card unlocked"><div class="ach-name">${a.name}</div><div class="ach-desc">${a.description}</div></div>
            `).join('')}
            ${locked.map(a => `
                <div class="ach-card locked"><div style="font-size:1.5rem;margin-bottom:6px;">🔒</div><div class="ach-name">${a.description}</div></div>
            `).join('')}
        </div>
        <div class="btn-group">
            <button class="btn btn-gold" onclick="LearningStats.export()">📥 تصدير JSON</button>
            <button class="btn btn-blue" onclick="window.location.href='../index.html'">🏠 العودة</button>
            <button class="btn btn-red" onclick="if(LearningStats.reset())location.reload()">🗑️ إعادة تعيين</button>
        </div>
    `;
}
displayStats();
</script>
</body>
</html>
