<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إحصائياتي | خوارزمي IA</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Cairo:wght@600;800;900&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/khawarizmi-main.css">
  <link rel="stylesheet" href="../css/bac-tools.css">
  <link rel="stylesheet" href="../css/print-styles.css">
  <link rel="stylesheet" href="../css/chatbot.css">
  <link rel="stylesheet" href="../css/chatbot-enhanced.css">
  <style>
    body { padding-top: 80px; }
    .navbar-premium { background: rgba(255,255,255,0.98); }
    .bac-sub-links {
      display: flex; gap: 4px; list-style: none; flex-wrap: wrap; align-items: center;
    }
    .bac-sub-links a {
      color: var(--text-dark, #2C2C3E); text-decoration: none; padding: 6px 12px;
      border-radius: 20px; font-weight: 600; font-size: 0.82rem; transition: all 0.3s; white-space: nowrap;
    }
    .bac-sub-links a:hover, .bac-sub-links a.active { background: #C9A961; color: white; }
    .stats-hero {
      background: linear-gradient(135deg, #1A2942, #2A3A52);
      color: white;
      padding: 50px 30px;
      text-align: center;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin: -40px 20px 30px;
      position: relative;
      z-index: 1;
    }

    .stat-main-card {
      background: white;
      padding: 28px 20px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 8px 30px rgba(0,0,0,0.1);
      border-top: 4px solid var(--bac-gold);
      transition: all 0.3s;
    }

    .stat-main-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 16px 40px rgba(0,0,0,0.15);
    }

    .stat-main-icon { font-size: 2.5rem; margin-bottom: 8px; }

    .stat-main-value {
      font-family: 'Cairo', sans-serif;
      font-size: 2.5rem;
      font-weight: 800;
      color: var(--bac-gold-dark);
    }

    .stat-main-label {
      color: var(--bac-text-light);
      font-size: 0.9rem;
      font-weight: 600;
    }

    .domain-progress {
      background: white;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 12px;
    }

    .domain-progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .domain-progress-bar {
      height: 10px;
      background: #E8E8E8;
      border-radius: 5px;
      overflow: hidden;
    }

    .domain-progress-fill {
      height: 100%;
      border-radius: 5px;
      transition: width 1s ease;
    }

    .history-item {
      background: white;
      padding: 16px 20px;
      border-radius: 12px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      transition: all 0.3s;
    }

    .history-item:hover {
      transform: translateX(-4px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    }

    .score-badge {
      padding: 6px 14px;
      border-radius: 20px;
      font-weight: 700;
      font-size: 0.9rem;
    }

    .score-badge.high { background: #D1FAE5; color: #065F46; }
    .score-badge.medium { background: #FEF3C7; color: #92400E; }
    .score-badge.low { background: #FEE2E2; color: #991B1B; }

    .topic-tag {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 10px;
      font-size: 0.8rem;
      font-weight: 600;
      margin: 2px;
    }

    .topic-tag.weak { background: #FEE2E2; color: #991B1B; }
    .topic-tag.strong { background: #D1FAE5; color: #065F46; }

    .chart-container {
      background: white;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
    }

    .bar-chart {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      height: 200px;
      padding-top: 20px;
    }

    .bar-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .bar {
      width: 100%;
      max-width: 50px;
      border-radius: 8px 8px 0 0;
      transition: height 1s ease;
      min-height: 4px;
    }

    .bar-label {
      font-size: 0.7rem;
      color: var(--bac-text-light);
      text-align: center;
    }

    .bar-value {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--bac-text);
    }

    .achievement-card {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      border-radius: 14px;
      margin: 4px;
      font-weight: 700;
      font-size: 0.9rem;
      transition: all 0.3s;
    }

    .achievement-card.unlocked {
      background: linear-gradient(135deg, #FFD700, #FFA500);
      color: #1A2942;
    }

    .achievement-card.locked {
      background: #E8E8E8;
      color: #8A9AAA;
      opacity: 0.6;
    }

    .achievement-card.unlocked:hover {
      transform: scale(1.05);
    }

    @media (max-width: 768px) {
      .stats-grid {
        grid-template-columns: 1fr 1fr;
        margin: -30px 16px 20px;
      }
      .stat-main-value { font-size: 2rem; }
      .bar-chart { height: 150px; }
    }
  </style>
</head>
<body>

<nav class="navbar-premium">
  <div class="nav-container">
    <a href="../index.html" class="nav-logo">
      <img src="../assets/logo.png" alt="Khawarizmi IA" class="logo-img">
      <div class="logo-text">
        <span class="logo-ar">خوارزمي</span>
        <span class="logo-en">KHAWARIZMI <span class="logo-ia">IA</span></span>
      </div>
    </a>
    <ul class="bac-sub-links">
      <li><a href="methodologie-bac.html">📝 المنهجية</a></li>
      <li><a href="banque-questions.html">❓ الأسئلة</a></li>
      <li><a href="examen-simule.html">🎓 امتحان</a></li>
      <li><a href="statistiques.html" class="active">📊 إحصائياتي</a></li>
      <li><a href="glossaire.html">📖 القاموس</a></li>
    </ul>
    <div class="nav-actions">
      <a href="../connexion.html" class="btn-login">تسجيل الدخول</a>
      <a href="../inscription.html" class="btn-signup">إنشاء حساب 🚀</a>
    </div>
  </div>
</nav>

<div class="stats-hero">
  <div style="font-size: 3.5rem; margin-bottom: 12px;">📊</div>
  <h1 style="font-family: 'Cairo', sans-serif; font-size: 2.2rem; margin-bottom: 8px;">
    إحصائياتي
  </h1>
  <p style="opacity: 0.9;">تابع تقدمك وحسّن أداءك يوماً بعد يوم</p>
</div>

<div class="stats-grid" id="mainStats"></div>

<div class="bac-container">

  <div class="chart-container" id="progressChart">
    <h3 style="font-family: 'Cairo', sans-serif; color: var(--bac-gold-dark); margin-bottom: 20px;">
      📈 تطور النتائج
    </h3>
    <div class="bar-chart" id="barChart"></div>
  </div>

  <div class="bac-card gold" id="domainPerformance">
    <h3 style="font-family: 'Cairo', sans-serif; color: var(--bac-gold-dark); margin-bottom: 20px;">
      🎯 الأداء حسب المجال
    </h3>
    <div id="domainBars"></div>
  </div>

  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px;">
    <div class="bac-card green" id="strongTopicsCard">
      <h3 style="color: #065F46;">💪 نقاط القوة</h3>
      <div id="strongTopics" style="margin-top: 12px;"></div>
    </div>
    <div class="bac-card red" id="weakTopicsCard">
      <h3 style="color: #991B1B;">⚠️ نقاط تحتاج تقوية</h3>
      <div id="weakTopics" style="margin-top: 12px;"></div>
    </div>
  </div>

  <div class="bac-card purple" id="achievementsCard">
    <h3 style="font-family: 'Cairo', sans-serif; color: #7C5FCD; margin-bottom: 16px;">
      🏆 الإنجازات
    </h3>
    <div id="achievementsList"></div>
  </div>

  <div class="bac-card gold" id="historyCard">
    <h3 style="font-family: 'Cairo', sans-serif; color: var(--bac-gold-dark); margin-bottom: 16px;">
      📋 آخر الامتحانات
    </h3>
    <div id="examHistory"></div>
  </div>

  <div style="display: flex; gap: 12px; justify-content: center; margin-top: 30px; flex-wrap: wrap;">
    <button onclick="ShareResults.showStatsShareModal()" style="padding: 12px 24px; background: #25D366; color: white; border: none; border-radius: 50px; font-weight: 700; cursor: pointer; font-family: 'Tajawal', sans-serif;">
      📤 شارك إحصائياتك
    </button>
    <button onclick="PrintHelper.printStats()" style="padding: 12px 24px; background: #3B82F6; color: white; border: none; border-radius: 50px; font-weight: 700; cursor: pointer; font-family: 'Tajawal', sans-serif;">
      🖨️ طباعة التقرير
    </button>
    <button onclick="ExamStats.export()" style="padding: 12px 24px; background: var(--bac-gold); color: white; border: none; border-radius: 50px; font-weight: 700; cursor: pointer; font-family: 'Tajawal', sans-serif;">
      📥 تصدير
    </button>
    <button onclick="if(ExamStats.reset()) loadStats();" style="padding: 12px 24px; background: var(--bac-danger); color: white; border: none; border-radius: 50px; font-weight: 700; cursor: pointer; font-family: 'Tajawal', sans-serif;">
      🗑️ إعادة تعيين
    </button>
    <a href="examen-simule.html" style="padding: 12px 24px; background: var(--bac-info); color: white; border: none; border-radius: 50px; font-weight: 700; cursor: pointer; font-family: 'Tajawal', sans-serif; text-decoration: none;">
      🎓 امتحان جديد
    </a>
  </div>

</div>

<script src="../js/exam-stats.js"></script>
<script src="../js/print-helper.js"></script>
<script src="../js/share-results.js"></script>
<script src="../js/svt-filter.js"></script>
    <script src="../js/chatbot.js"></script>
<script>
  function loadStats() {
    const stats = ExamStats.getStats();
    const summary = ExamStats.getSummary();
    const allAchievements = ExamStats.checkAchievements(stats);

    document.getElementById('mainStats').innerHTML = `
      <div class="stat-main-card">
        <div class="stat-main-icon">📝</div>
        <div class="stat-main-value">${stats.totalExams}</div>
        <div class="stat-main-label">امتحانات</div>
      </div>
      <div class="stat-main-card">
        <div class="stat-main-icon">📊</div>
        <div class="stat-main-value">${stats.averageScore}%</div>
        <div class="stat-main-label">المعدل العام</div>
      </div>
      <div class="stat-main-card">
        <div class="stat-main-icon">⭐</div>
        <div class="stat-main-value">${stats.bestScore}%</div>
        <div class="stat-main-label">أفضل نتيجة</div>
      </div>
      <div class="stat-main-card">
        <div class="stat-main-icon">🔥</div>
        <div class="stat-main-value">${stats.streakDays}</div>
        <div class="stat-main-label">أيام متتالية</div>
      </div>
      <div class="stat-main-card">
        <div class="stat-main-icon">⏱️</div>
        <div class="stat-main-value">${stats.timeSpentTotal}</div>
        <div class="stat-main-label">دقيقة دراسة</div>
      </div>
      <div class="stat-main-card">
        <div class="stat-main-icon">🏆</div>
        <div class="stat-main-value">${stats.achievements.length}</div>
        <div class="stat-main-label">إنجازات</div>
      </div>
    `;

    const lastExams = stats.exams.slice(-10);
    const barChart = document.getElementById('barChart');

    if (lastExams.length === 0) {
      barChart.innerHTML = '<p style="text-align: center; color: var(--bac-text-light); padding: 40px;">لم تُجرِ أي امتحان بعد. <a href="examen-simule.html" style="color: var(--bac-gold);">ابدأ الآن!</a></p>';
    } else {
      barChart.innerHTML = lastExams.map((exam) => {
        const color = exam.score >= 80 ? '#10B981' : exam.score >= 50 ? '#F59E0B' : '#DC2626';
        const date = new Date(exam.date);
        const dateStr = date.getDate() + '/' + (date.getMonth() + 1);

        return `
          <div class="bar-item">
            <div class="bar-value">${exam.score}%</div>
            <div class="bar" style="height: ${Math.max(exam.score, 5)}%; background: ${color};"></div>
            <div class="bar-label">${dateStr}</div>
          </div>
        `;
      }).join('');
    }

    const domains = [
      { key: 'proteines', name: '🧬 البروتينات', color: '#8B5CF6' },
      { key: 'energie', name: '⚡ الطاقة', color: '#DC2626' },
      { key: 'geologie', name: '🌍 الجيولوجيا', color: '#3B82F6' }
    ];

    document.getElementById('domainBars').innerHTML = domains.map(d => {
      const domainData = stats.domainStats[d.key];
      const avg = domainData.avgScore || 0;

      return `
        <div class="domain-progress">
          <div class="domain-progress-header">
            <strong>${d.name}</strong>
            <span style="font-weight: 700; color: ${d.color};">${avg}%</span>
          </div>
          <div class="domain-progress-bar">
            <div class="domain-progress-fill" style="width: ${avg}%; background: ${d.color};"></div>
          </div>
          <div style="font-size: 0.8rem; color: var(--bac-text-light); margin-top: 4px;">
            ${domainData.attempts} سؤال مُجاب
          </div>
        </div>
      `;
    }).join('');

    const strongDiv = document.getElementById('strongTopics');
    if (stats.strongTopics.length === 0) {
      strongDiv.innerHTML = '<p style="color: var(--bac-text-light);">أجب على المزيد من الأسئلة لتحديد نقاط قوتك</p>';
    } else {
      strongDiv.innerHTML = stats.strongTopics.map(t =>
        `<span class="topic-tag strong">${t.topic} (${t.avg}%)</span>`
      ).join('');
    }

    const weakDiv = document.getElementById('weakTopics');
    if (stats.weakTopics.length === 0) {
      weakDiv.innerHTML = '<p style="color: var(--bac-text-light);">لا توجد نقاط ضعف محددة حالياً</p>';
    } else {
      weakDiv.innerHTML = stats.weakTopics.map(t =>
        `<span class="topic-tag weak">${t.topic} (${t.avg}%)</span>`
      ).join('');
    }

    document.getElementById('achievementsList').innerHTML = allAchievements.map(a => `
      <span class="achievement-card ${stats.achievements.includes(a.id) ? 'unlocked' : 'locked'}">
        ${a.name}
      </span>
    `).join('');

    const historyDiv = document.getElementById('examHistory');
    const recentExams = stats.exams.slice(-5).reverse();

    if (recentExams.length === 0) {
      historyDiv.innerHTML = '<p style="text-align: center; color: var(--bac-text-light); padding: 20px;">لا توجد امتحانات سابقة</p>';
    } else {
      historyDiv.innerHTML = recentExams.map(exam => {
        const date = new Date(exam.date);
        const dateStr = date.toLocaleDateString('ar-DZ');
        const scoreClass = exam.score >= 80 ? 'high' : exam.score >= 50 ? 'medium' : 'low';

        return `
          <div class="history-item">
            <div>
              <strong>${dateStr}</strong>
              <div style="font-size: 0.85rem; color: var(--bac-text-light);">
                ${exam.answeredCount}/${exam.questionsCount} أسئلة • ${exam.timeSpent} دقيقة
              </div>
            </div>
            <span class="score-badge ${scoreClass}">
              ${exam.score}% (${exam.grade})
            </span>
          </div>
        `;
      }).join('');
    }
  }

  loadStats();
</script>

</body>
</html>
