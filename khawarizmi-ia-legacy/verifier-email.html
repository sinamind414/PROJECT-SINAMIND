<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تأكيد البريد الإلكتروني | خوارزمي IA</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&family=Cairo:wght@600;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>

<div class="auth-container" style="grid-template-columns: 1fr; max-width: 600px;">
  <div class="auth-form-panel" style="text-align: center; padding: 60px 40px;">

    <div style="font-size: 5rem; margin-bottom: 24px;" id="statusIcon">⏳</div>

    <h1 id="statusTitle" style="font-family: 'Cairo', sans-serif; font-size: 2rem; margin-bottom: 16px;">
      جاري التحقق...
    </h1>

    <p id="statusMessage" style="color: #5A6A7A; margin-bottom: 30px; line-height: 1.8;">
      يرجى الانتظار، نقوم بتأكيد بريدك الإلكتروني.
    </p>

    <div id="actions" style="display: none;">
      <a href="connexion.html" class="btn-submit" style="text-decoration: none; display: inline-flex; min-width: 200px;">
        <span class="btn-text">تسجيل الدخول 🚀</span>
      </a>
    </div>

    <div id="resendSection" style="margin-top: 24px; display: none;">
      <p style="color: #5A6A7A; margin-bottom: 12px;">لم تستلم الرابط؟</p>
      <button class="btn-submit" id="resendBtn" style="background: white; color: #1A2942; border: 2px solid #E8E8E8;">
        <span class="btn-text">📧 إعادة الإرسال</span>
      </button>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="js/auth-supabase.js"></script>
<script>
  async function checkEmailConfirmation() {
    const hashParams = new URLSearchParams(window.location.hash.substring(1));
    const accessToken = hashParams.get('access_token');
    const type = hashParams.get('type');

    if (type === 'signup' && accessToken) {
      document.getElementById('statusIcon').textContent = '✅';
      document.getElementById('statusTitle').textContent = 'تم تأكيد بريدك بنجاح!';
      document.getElementById('statusMessage').textContent = 'يمكنك الآن تسجيل الدخول والاستفادة من جميع ميزات المنصة.';
      document.getElementById('actions').style.display = 'block';
    } else {
      document.getElementById('statusIcon').textContent = '📧';
      document.getElementById('statusTitle').textContent = 'تحقق من بريدك الإلكتروني';
      document.getElementById('statusMessage').innerHTML = `
        لقد أرسلنا رابط تأكيد إلى بريدك الإلكتروني.<br>
        <strong>اضغط على الرابط لتفعيل حسابك.</strong>
      `;
      document.getElementById('resendSection').style.display = 'block';
    }
  }

  document.getElementById('resendBtn')?.addEventListener('click', async () => {
    const email = prompt('أدخل بريدك الإلكتروني:');
    if (email) {
      const result = await AuthSupabase.resendVerificationEmail(email);
      if (result.success) {
        alert('✅ ' + result.message);
      } else {
        alert('❌ ' + result.error);
      }
    }
  });

  checkEmailConfirmation();
</script>

</body>
</html>
