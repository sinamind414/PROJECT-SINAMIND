<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>حسابي | خوارزمي IA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&family=Cairo:wght@600;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/auth.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
  <style>
    body {
      align-items: flex-start;
      padding: 40px 20px;
    }
    
    .dashboard-container {
      max-width: 1100px;
      width: 100%;
      background: white;
      border-radius: 24px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.1);
      overflow: hidden;
    }
    
    .dashboard-header {
      background: linear-gradient(135deg, #1A2942 0%, #2A3A52 100%);
      color: white;
      padding: 40px;
      display: flex;
      align-items: center;
      gap: 24px;
      flex-wrap: wrap;
    }
    
    .user-avatar {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #C9A961, #A68845);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: 800;
      color: white;
      font-family: 'Cairo', sans-serif;
    }
    
    .user-info h1 {
      font-family: 'Cairo', sans-serif;
      font-size: 1.8rem;
      margin-bottom: 6px;
    }
    
    .user-info p {
      opacity: 0.8;
      font-size: 0.95rem;
    }
    
    .logout-btn {
      margin-right: auto;
      background: rgba(220, 38, 38, 0.2);
      color: #FCA5A5;
      border: 1px solid rgba(220, 38, 38, 0.3);
      padding: 10px 20px;
      border-radius: 12px;
      cursor: pointer;
      font-family: 'Tajawal', sans-serif;
      font-weight: 700;
      transition: all 0.3s;
    }
    
    .logout-btn:hover {
      background: rgba(220, 38, 38, 0.3);
    }
    
    .dashboard-body {
      padding: 40px;
    }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }
    
    .stat-box {
      background: #FAFAFA;
      padding: 24px;
      border-radius: 16px;
      border: 2px solid #E8E8E8;
      text-align: center;
    }
    
    .stat-box-icon {
      font-size: 2.5rem;
      margin-bottom: 12px;
    }
    
    .stat-box-num {
      font-family: 'Cairo', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      color: #C9A961;
      margin-bottom: 4px;
    }
    
    .stat-box-label {
      color: #5A6A7A;
      font-size: 0.9rem;
      font-weight: 600;
    }
    
    .info-section {
      background: #FAFAFA;
      padding: 24px;
      border-radius: 16px;
      margin-bottom: 24px;
    }
    
    .info-section h2 {
      font-family: 'Cairo', sans-serif;
      color: #1A2942;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 16px;
    }
    
    .info-item {
      background: white;
      padding: 14px 18px;
      border-radius: 10px;
      border: 1px solid #E8E8E8;
    }
    
    .info-label {
      color: #8A9AAA;
      font-size: 0.8rem;
      margin-bottom: 4px;
    }
    
    .info-value {
      color: #1A2942;
      font-weight: 700;
    }
    
    .action-buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    
    .action-buttons a {
      flex: 1;
      min-width: 200px;
      text-decoration: none;
      text-align: center;
    }
  </style>
</head>
<body>

<div class="dashboard-container">
  
  <div class="dashboard-header">
    <div class="user-avatar" id="userAvatar">؟</div>
    <div class="user-info">
      <h1 id="userName">جاري التحميل...</h1>
      <p id="userEmail"></p>
    </div>
    <button class="logout-btn" onclick="logout()">🚪 تسجيل الخروج</button>
  </div>

  <div class="dashboard-body">
    
    <!-- Statistiques -->
    <div class="stats-grid">
      <div class="stat-box">
        <div class="stat-box-icon">📚</div>
        <div class="stat-box-num" id="chaptersRead">0</div>
        <div class="stat-box-label">فصول مدروسة</div>
      </div>
      <div class="stat-box">
        <div class="stat-box-icon">🧪</div>
        <div class="stat-box-num" id="quizCompleted">0</div>
        <div class="stat-box-label">اختبارات منجزة</div>
      </div>
      <div class="stat-box">
        <div class="stat-box-icon">⏱️</div>
        <div class="stat-box-num" id="timeSpent">0h</div>
        <div class="stat-box-label">وقت الدراسة</div>
      </div>
      <div class="stat-box">
        <div class="stat-box-icon">🏆</div>
        <div class="stat-box-num">طالب</div>
        <div class="stat-box-label">المستوى</div>
      </div>
    </div>

    <!-- Informations personnelles -->
    <div class="info-section">
      <h2>👤 معلوماتي الشخصية</h2>
      <div class="info-grid">
        <div class="info-item">
          <div class="info-label">📧 البريد الإلكتروني</div>
          <div class="info-value" id="infoEmail"></div>
        </div>
        <div class="info-item">
          <div class="info-label">📱 رقم الهاتف</div>
          <div class="info-value" id="infoPhone"></div>
        </div>
        <div class="info-item">
          <div class="info-label">📍 الولاية</div>
          <div class="info-value" id="infoWilaya"></div>
        </div>
        <div class="info-item">
          <div class="info-label">🎂 تاريخ الميلاد</div>
          <div class="info-value" id="infoBirthdate"></div>
        </div>
        <div class="info-item">
          <div class="info-label">🎓 المستوى</div>
          <div class="info-value" id="infoLevel"></div>
        </div>
        <div class="info-item">
          <div class="info-label">💬 Telegram</div>
          <div class="info-value" id="infoTelegram"></div>
        </div>
      </div>
    </div>

    <!-- Actions rapides -->
    <div class="action-buttons">
      <a href="modifier-profil.html" class="btn-submit">
        <span class="btn-text">✏️ تعديل الملف الشخصي</span>
      </a>
      <a href="securite.html" class="btn-submit">
        <span class="btn-text">🔒 الأمان والحماية</span>
      </a>
      <a href="index.html" class="btn-submit">
        <span class="btn-text">🏠 الصفحة الرئيسية</span>
      </a>
      <a href="pages/unit-1-1.html" class="btn-submit">
        <span class="btn-text">📖 متابعة الدراسة</span>
      </a>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="js/auth.js"></script>
<script src="js/auth-supabase.js"></script>
<script src="js/wilayas.js"></script>
<script>
  async function init() {
    // Try Supabase first, fallback localStorage
    if (supabaseAvailable) {
      if (!await requireAuth()) return;
      const profile = await getCurrentProfile();
      if (!profile) { window.location.href = 'connexion.html'; return; }

      const initials = (profile.first_name[0] + (profile.last_name[0] || '')).toUpperCase();
      document.getElementById('userAvatar').textContent = initials;
      document.getElementById('userName').textContent = `${profile.first_name} ${profile.last_name}`;
      document.getElementById('userEmail').textContent = profile.email;
      document.getElementById('infoEmail').textContent = profile.email;
      document.getElementById('infoPhone').textContent = profile.phone || 'غير محدد';
      document.getElementById('infoWilaya').textContent = getWilayaName(profile.wilaya);
      if (profile.birthdate) {
        document.getElementById('infoBirthdate').textContent = new Date(profile.birthdate).toLocaleDateString('ar-DZ');
      } else {
        document.getElementById('infoBirthdate').textContent = 'غير محدد';
      }
      const levels = { '3as': '🎓 السنة الثالثة ثانوي', '2as': '📚 السنة الثانية ثانوي', '1as': '📖 السنة الأولى ثانوي', 'teacher': '👨‍🏫 أستاذ/معلم', 'parent': '👨‍👩‍👧 ولي أمر', 'other': '🔍 أخرى' };
      document.getElementById('infoLevel').textContent = levels[profile.level] || profile.level || 'غير محدد';
      document.getElementById('infoTelegram').textContent = profile.telegram || 'غير محدد';
      const stats = profile.stats || {};
      document.getElementById('chaptersRead').textContent = stats.chaptersRead || 0;
      document.getElementById('quizCompleted').textContent = stats.quizCompleted || 0;
      document.getElementById('timeSpent').textContent = Math.round((stats.timeSpent || 0) / 60) + 'h';
    } else {
      // Fallback localStorage
      const user = Auth.getCurrentUser();
      if (!user) { window.location.href = 'connexion.html'; return; }

      const initials = (user.firstName[0] + user.lastName[0]).toUpperCase();
      document.getElementById('userAvatar').textContent = initials;
      document.getElementById('userName').textContent = `${user.firstName} ${user.lastName}`;
      document.getElementById('userEmail').textContent = user.email;
      document.getElementById('infoEmail').textContent = user.email;
      document.getElementById('infoPhone').textContent = user.phone || 'غير محدد';
      document.getElementById('infoWilaya').textContent = getWilayaName(user.wilaya);
      if (user.birthdate) {
        document.getElementById('infoBirthdate').textContent = new Date(user.birthdate).toLocaleDateString('ar-DZ');
      } else {
        document.getElementById('infoBirthdate').textContent = 'غير محدد';
      }
      const levels = { '3as': '🎓 السنة الثالثة ثانوي', '2as': '📚 السنة الثانية ثانوي', '1as': '📖 السنة الأولى ثانوي', 'teacher': '👨‍🏫 أستاذ/معلم', 'parent': '👨‍👩‍👧 ولي أمر', 'other': '🔍 أخرى' };
      document.getElementById('infoLevel').textContent = levels[user.level] || user.level || 'غير محدد';
      document.getElementById('infoTelegram').textContent = user.telegram || 'غير محدد';
      const stats = user.stats || {};
      document.getElementById('chaptersRead').textContent = stats.chaptersRead || 0;
      document.getElementById('quizCompleted').textContent = stats.quizCompleted || 0;
      document.getElementById('timeSpent').textContent = Math.round((stats.timeSpent || 0) / 60) + 'h';
    }
  }

  function logout() {
    if (confirm('هل تريد فعلاً تسجيل الخروج؟')) {
      AuthSupabase.logout();
    }
  }

  init();
</script>

</body>
</html>
