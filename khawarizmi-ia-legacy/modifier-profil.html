<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تعديل الملف الشخصي | خوارزمي IA</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&family=Cairo:wght@600;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/auth.css">
  <style>
    body { align-items: flex-start; padding: 40px 20px; }
    .profile-container { max-width: 800px; width: 100%; background: white; border-radius: 24px; padding: 40px; box-shadow: 0 24px 80px rgba(0,0,0,0.1); }

    .avatar-section {
      text-align: center;
      margin-bottom: 40px;
      padding-bottom: 30px;
      border-bottom: 2px solid #F5EDD8;
    }

    .avatar-display {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      margin: 0 auto 20px;
      background: linear-gradient(135deg, #C9A961, #A68845);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4rem;
      color: white;
      font-weight: 800;
      overflow: hidden;
      position: relative;
      cursor: pointer;
      transition: transform 0.3s;
    }

    .avatar-display:hover {
      transform: scale(1.05);
    }

    .avatar-display img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .avatar-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1.5rem;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .avatar-display:hover .avatar-overlay {
      opacity: 1;
    }

    .avatar-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .avatar-btn {
      padding: 10px 20px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-family: 'Tajawal', sans-serif;
      font-weight: 700;
      transition: all 0.3s;
    }

    .btn-upload { background: #C9A961; color: white; }
    .btn-delete { background: #FEE2E2; color: #DC2626; }
  </style>
</head>
<body>

<div class="profile-container">

  <div class="auth-form-header" style="margin-bottom: 30px;">
    <h1>✏️ تعديل الملف الشخصي</h1>
    <p>قم بتحديث معلوماتك الشخصية</p>
  </div>

  <div id="messageBox" class="message-box" style="display: none;"></div>

  <div class="avatar-section">
    <div class="avatar-display" id="avatarDisplay" onclick="document.getElementById('avatarInput').click()">
      <span id="avatarInitials">؟</span>
      <div class="avatar-overlay">📷</div>
    </div>

    <input type="file" id="avatarInput" accept="image/*" style="display: none;">

    <div class="avatar-actions">
      <button class="avatar-btn btn-upload" onclick="document.getElementById('avatarInput').click()">
        📷 رفع صورة
      </button>
      <button class="avatar-btn btn-delete" id="deleteAvatarBtn" style="display: none;">
        🗑️ حذف الصورة
      </button>
    </div>
    <p style="color: #8A9AAA; font-size: 0.85rem; margin-top: 12px;">JPG, PNG أو GIF (الحد الأقصى 2MB)</p>
  </div>

  <form id="profileForm" class="auth-form">

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">الاسم</label>
        <div class="input-wrapper">
          <input type="text" id="firstName" class="form-input" required>
          <span class="input-icon">👤</span>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">اللقب</label>
        <div class="input-wrapper">
          <input type="text" id="lastName" class="form-input" required>
          <span class="input-icon">👤</span>
        </div>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">البريد الإلكتروني (لا يمكن تغييره)</label>
      <div class="input-wrapper">
        <input type="email" id="email" class="form-input" disabled style="background: #F5F5F5;">
        <span class="input-icon">📧</span>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">رقم الهاتف</label>
        <div class="input-wrapper">
          <input type="tel" id="phone" class="form-input" pattern="0[5-7][0-9]{8}" dir="ltr" style="text-align: left;">
          <span class="input-icon">📱</span>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">الولاية</label>
        <select id="wilaya" class="form-select">
          <option value="">-- اختر --</option>
        </select>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Telegram</label>
        <div class="input-wrapper">
          <input type="text" id="telegram" class="form-input" placeholder="@username" dir="ltr" style="text-align: left;">
          <span class="input-icon">💬</span>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">تاريخ الميلاد</label>
        <div class="input-wrapper">
          <input type="date" id="birthdate" class="form-input">
          <span class="input-icon">🎂</span>
        </div>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">المستوى الدراسي</label>
      <select id="level" class="form-select">
        <option value="3as">🎓 السنة الثالثة ثانوي</option>
        <option value="2as">📚 السنة الثانية ثانوي</option>
        <option value="1as">📖 السنة الأولى ثانوي</option>
        <option value="teacher">👨‍🏫 أستاذ</option>
        <option value="parent">👨‍👩‍👧 ولي أمر</option>
        <option value="other">🔍 أخرى</option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">نبذة (اختياري)</label>
      <textarea id="bio" class="form-input" rows="3" placeholder="اكتب نبذة عنك..." style="resize: vertical;"></textarea>
    </div>

    <div class="checkbox-group">
      <input type="checkbox" id="newsletter" class="checkbox-input">
      <label for="newsletter" class="checkbox-label">
        📬 أرغب في تلقي النصائح التعليمية عبر البريد
      </label>
    </div>

    <div style="display: flex; gap: 12px; flex-wrap: wrap;">
      <button type="submit" class="btn-submit" id="saveBtn" style="flex: 1; min-width: 200px;">
        <span class="btn-text">💾 حفظ التغييرات</span>
        <span class="spinner"></span>
      </button>
      <a href="mon-compte.html" class="btn-submit" style="background: #F5F5F5; color: #1A2942; text-decoration: none; flex: 1; min-width: 200px; text-align: center;">
        <span class="btn-text">← العودة</span>
      </a>
    </div>

  </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="js/auth-supabase.js"></script>
<script src="js/avatar-upload.js"></script>
<script src="js/wilayas.js"></script>
<script>
  let currentProfile = null;

  async function init() {
    if (!await requireAuth()) return;

    currentProfile = await getCurrentProfile();
    if (!currentProfile) {
      alert('خطأ في تحميل الملف الشخصي');
      window.location.href = 'connexion.html';
      return;
    }

    populateWilayas(document.getElementById('wilaya'));

    document.getElementById('firstName').value = currentProfile.first_name || '';
    document.getElementById('lastName').value = currentProfile.last_name || '';
    document.getElementById('email').value = currentProfile.email || '';
    document.getElementById('phone').value = currentProfile.phone || '';
    document.getElementById('wilaya').value = currentProfile.wilaya || '';
    document.getElementById('telegram').value = currentProfile.telegram || '';
    document.getElementById('birthdate').value = currentProfile.birthdate || '';
    document.getElementById('level').value = currentProfile.level || '';
    document.getElementById('bio').value = currentProfile.bio || '';
    document.getElementById('newsletter').checked = currentProfile.newsletter || false;

    if (currentProfile.avatar_url) {
      document.getElementById('avatarDisplay').innerHTML = `<img src="${currentProfile.avatar_url}" alt="Avatar"><div class="avatar-overlay">📷</div>`;
      document.getElementById('deleteAvatarBtn').style.display = 'inline-block';
    } else {
      const initials = (currentProfile.first_name[0] + (currentProfile.last_name[0] || '')).toUpperCase();
      document.getElementById('avatarInitials').textContent = initials;
    }
  }

  function showMessage(type, text) {
    const box = document.getElementById('messageBox');
    box.className = `message-box ${type}`;
    const icons = { success: '✅', error: '❌' };
    box.innerHTML = `<span class="message-icon">${icons[type]}</span><span>${text}</span>`;
    box.style.display = 'flex';
    box.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  document.getElementById('avatarInput').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    showMessage('info', '📤 جاري رفع الصورة...');

    const compressed = await AvatarUpload.compressImage(file);
    const result = await AvatarUpload.uploadAvatar(compressed);

    if (result.success) {
      showMessage('success', '✅ تم رفع الصورة بنجاح');
      document.getElementById('avatarDisplay').innerHTML = `<img src="${result.url}" alt="Avatar"><div class="avatar-overlay">📷</div>`;
      document.getElementById('deleteAvatarBtn').style.display = 'inline-block';
    } else {
      showMessage('error', result.error);
    }
  });

  document.getElementById('deleteAvatarBtn').addEventListener('click', async () => {
    if (!confirm('هل تريد حذف الصورة؟')) return;

    const result = await AvatarUpload.deleteAvatar();
    if (result.success) {
      showMessage('success', '🗑️ تم حذف الصورة');
      const initials = (currentProfile.first_name[0] + (currentProfile.last_name[0] || '')).toUpperCase();
      document.getElementById('avatarDisplay').innerHTML = `<span>${initials}</span><div class="avatar-overlay">📷</div>`;
      document.getElementById('deleteAvatarBtn').style.display = 'none';
    } else {
      showMessage('error', result.error);
    }
  });

  document.getElementById('profileForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('saveBtn');
    btn.classList.add('loading');
    btn.disabled = true;

    const updates = {
      first_name: document.getElementById('firstName').value.trim(),
      last_name: document.getElementById('lastName').value.trim(),
      phone: document.getElementById('phone').value.trim(),
      wilaya: document.getElementById('wilaya').value,
      telegram: document.getElementById('telegram').value.trim(),
      birthdate: document.getElementById('birthdate').value,
      level: document.getElementById('level').value,
      bio: document.getElementById('bio').value.trim(),
      newsletter: document.getElementById('newsletter').checked
    };

    const result = await AuthSupabase.updateProfile(updates);

    if (result.success) {
      showMessage('success', '✅ تم حفظ التغييرات بنجاح');
    } else {
      showMessage('error', result.error);
    }

    btn.classList.remove('loading');
    btn.disabled = false;
  });

  init();
</script>

</body>
</html>
