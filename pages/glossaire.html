<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>القاموس العلمي | خوارزمي IA</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Cairo:wght@800&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/khawarizmi-main.css">
  <link rel="stylesheet" href="../css/bac-tools.css">
  <link rel="stylesheet" href="../css/print-styles.css">
  <link rel="stylesheet" href="../css/chatbot.css">
  <link rel="stylesheet" href="../css/chatbot-enhanced.css">
  <style>
    body { padding-top: 80px; }
    .navbar-premium { background: rgba(255,255,255,0.98); }
    .bac-sub-links {
      display: flex; gap: 4px; list-style: none; flex-wrap: wrap; align-items: center;
    }
    .bac-sub-links a {
      color: var(--text-dark, #2C2C3E); text-decoration: none; padding: 6px 12px;
      border-radius: 20px; font-weight: 600; font-size: 0.82rem; transition: all 0.3s; white-space: nowrap;
    }
    .bac-sub-links a:hover, .bac-sub-links a.active { background: #C9A961; color: white; }
    .search-box {
      position: sticky;
      top: 85px;
      z-index: 50;
      background: white;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      margin-bottom: 24px;
    }

    .search-input {
      width: 100%;
      padding: 16px 20px;
      border: 3px solid #E8E8E8;
      border-radius: 14px;
      font-family: 'Tajawal', sans-serif;
      font-size: 1.1rem;
      transition: all 0.3s;
      box-sizing: border-box;
    }

    .search-input:focus {
      outline: none;
      border-color: #C9A961;
      box-shadow: 0 0 0 4px rgba(201,169,97,0.15);
    }

    .search-stats {
      display: flex;
      justify-content: space-between;
      margin-top: 12px;
      font-size: 0.85rem;
      color: #5A6A7A;
    }

    .term-card {
      background: white;
      border-radius: 14px;
      padding: 18px 22px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      border-right: 4px solid #C9A961;
      transition: all 0.3s;
      cursor: pointer;
    }

    .term-card:hover {
      transform: translateX(-4px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      border-color: #A68845;
    }

    .term-fr {
      font-weight: 700;
      color: #1A2942;
      font-size: 1rem;
    }

    .term-ar {
      font-weight: 700;
      color: #C9A961;
      font-size: 1.05rem;
    }

    .term-badge {
      padding: 3px 10px;
      border-radius: 8px;
      font-size: 0.7rem;
      font-weight: 700;
      margin-top: 4px;
      display: inline-block;
    }

    .term-badge.essential { background: #FEE2E2; color: #991B1B; }
    .term-badge.important { background: #FEF3C7; color: #92400E; }
    .term-badge.basic { background: #D1FAE5; color: #065F46; }

    .category-filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .cat-btn {
      padding: 8px 16px;
      border: 2px solid #E8E8E8;
      border-radius: 20px;
      background: white;
      cursor: pointer;
      font-family: 'Tajawal', sans-serif;
      font-weight: 600;
      font-size: 0.85rem;
      transition: all 0.3s;
    }

    .cat-btn:hover, .cat-btn.active {
      background: #C9A961;
      color: white;
      border-color: #C9A961;
    }

    @media (max-width: 600px) {
      .term-card {
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
      }
      .search-box { top: 60px; }
    }
  </style>
</head>
<body>

<nav class="navbar-premium">
  <div class="nav-container">
    <a href="../index.html" class="nav-logo">
      <img src="../assets/logo.png" alt="Khawarizmi IA" class="logo-img">
      <div class="logo-text">
        <span class="logo-ar">خوارزمي</span>
        <span class="logo-en">KHAWARIZMI <span class="logo-ia">IA</span></span>
      </div>
    </a>
    <ul class="bac-sub-links">
      <li><a href="glossaire.html" class="active">📖 القاموس</a></li>
      <li><a href="methodologie-bac.html">📝 المنهجية</a></li>
      <li><a href="banque-questions.html">❓ الأسئلة</a></li>
      <li><a href="examen-simule.html">🎓 امتحان</a></li>
      <li><a href="statistiques.html">📊 إحصائياتي</a></li>
    </ul>
    <div class="nav-actions">
      <a href="../connexion.html" class="btn-login">تسجيل الدخول</a>
      <a href="../inscription.html" class="btn-signup">إنشاء حساب 🚀</a>
    </div>
  </div>
</nav>

<header class="page-hero gold">
  <div class="page-hero-content">
    <div class="page-hero-icon">📖</div>
    <h1>القاموس العلمي الثنائي اللغة</h1>
    <p>فرنسي ↔ عربي | 120+ مصطلح علمي أساسي للبكالوريا</p>
  </div>
</header>

<div class="bac-container">

  <div class="search-box">
    <input type="text"
           class="search-input"
           id="searchInput"
           placeholder="🔍 ابحث بالفرنسية أو العربية..."
           oninput="filterTerms()">

    <div class="category-filters" id="catRow">
      <button class="cat-btn active" onclick="setCatFilter('all')">📚 الكل</button>
      <button class="cat-btn" onclick="setCatFilter('biologie')">🧬 بيولوجيا</button>
      <button class="cat-btn" onclick="setCatFilter('geologie')">🌍 جيولوجيا</button>
      <button class="cat-btn" onclick="setCatFilter('chimie')">🧪 كيمياء</button>
      <button class="cat-btn" onclick="setCatFilter('methodologie')">📝 منهجية</button>
    </div>
    <div class="category-filters" id="levelRow">
      <button class="cat-btn active" onclick="setLevelFilter('all')">🔵 المستوى: الكل</button>
      <button class="cat-btn" onclick="setLevelFilter('essential')">🔴 أساسي</button>
      <button class="cat-btn" onclick="setLevelFilter('important')">🟡 مهم</button>
      <button class="cat-btn" onclick="setLevelFilter('basic')">🟢 عام</button>
    </div>

    <div class="search-stats">
      <span id="resultCount">120+ مصطلح</span>
      <span>🔤 فرنسي ↔ عربي</span>
    </div>
  </div>

  <div id="termsList"></div>

</div>

<script src="../js/glossary-data.js"></script>
<script src="../js/print-helper.js"></script>
<script src="../js/svt-filter.js"></script>
    <script src="../js/chatbot.js"></script>

<style>
  .term-detail {
    display: none;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid #E8E8E8;
    font-size: 0.9rem;
    color: #3A4A5A;
    width: 100%;
    line-height: 1.7;
  }
  .term-detail.open { display: block; }
  .term-detail strong { color: #C9A961; }
  .term-detail .exemple-box {
    background: #FFFBF0;
    border-right: 3px solid #C9A961;
    padding: 8px 12px;
    border-radius: 8px;
    margin-top: 6px;
    font-size: 0.85rem;
  }
  .term-def {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }
  .term-def > div {
    flex: 1;
    min-width: 200px;
  }
  .detail-badge {
    display: inline-block;
    font-size: 0.6rem;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 6px;
    background: #E8E8E8;
    color: #5A6A7A;
    margin-left: 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .term-card.expanded {
    border-color: #A68845;
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
  }
</style>

<script>
  let currentCategory = 'all';
  let currentLevel = 'all';
  let expandedId = null;

  function getLevelBadge(level) {
    const labels = { essential: 'أساسي', important: 'مهم', basic: 'عام' };
    const colors = { essential: 'essential', important: 'important', basic: 'basic' };
    return `<span class="term-badge ${colors[level] || 'basic'}">${labels[level] || level}</span>`;
  }

  function renderTerms(terms) {
    const container = document.getElementById('termsList');
    if (!terms.length) {
      container.innerHTML = '<div style="text-align:center;padding:40px;color:#5A6A7A;">لا توجد نتائج 🔍</div>';
      return;
    }
    container.innerHTML = terms.map((t, i) => {
      const isExpanded = expandedId === i;
      const hasDetail = t.definition_fr || t.definition_ar || t.exemple;
      const detailId = 'td-' + i;
      return `
        <div class="term-card ${isExpanded ? 'expanded' : ''}" onclick="${hasDetail ? `toggleDetail('${detailId}', ${i})` : ''}" style="${hasDetail ? 'cursor:pointer' : ''}">
          <div style="flex:1">
            <div class="term-fr">${t.fr}</div>
            ${t.subcategory ? `<span class="detail-badge">${t.subcategory}</span>` : ''}
            ${getLevelBadge(t.level)}
          </div>
          <div class="term-ar">${t.ar}</div>
          <div class="term-detail ${isExpanded ? 'open' : ''}" id="${detailId}">
            ${t.definition_fr ? `
              <div class="term-def">
                <div><strong>Français</strong><br>${t.definition_fr}</div>
                <div><strong>العربية</strong><br>${t.definition_ar || ''}</div>
              </div>
            ` : ''}
            ${t.exemple ? `<div class="exemple-box">📌 ${t.exemple}</div>` : ''}
          </div>
        </div>
      `;
    }).join('');
    updateStats(terms.length);
  }

  function toggleDetail(id, index) {
    const el = document.getElementById(id);
    if (!el) return;
    const isOpen = el.classList.contains('open');
    // close all
    document.querySelectorAll('.term-detail').forEach(d => d.classList.remove('open'));
    document.querySelectorAll('.term-card').forEach(c => c.classList.remove('expanded'));
    if (!isOpen) {
      el.classList.add('open');
      el.closest('.term-card').classList.add('expanded');
      expandedId = index;
    } else {
      expandedId = null;
    }
  }

  function filterTerms() {
    const query = document.getElementById('searchInput').value;
    const results = GlossaryData.search(query);
    let filtered = results;
    if (currentCategory !== 'all') {
      filtered = filtered.filter(t => t.category === currentCategory);
    }
    if (currentLevel !== 'all') {
      filtered = filtered.filter(t => t.level === currentLevel);
    }
    renderTerms(filtered);
  }

  function setCatFilter(category) {
    currentCategory = category;
    document.querySelectorAll('#catRow .cat-btn').forEach(btn => btn.classList.remove('active'));
    document.querySelectorAll('#catRow .cat-btn').forEach(btn => {
      const onClick = btn.getAttribute('onclick') || '';
      if (onClick.includes(`'${category}'`)) btn.classList.add('active');
    });
    filterTerms();
  }

  function setLevelFilter(level) {
    currentLevel = level;
    document.querySelectorAll('#levelRow .cat-btn').forEach(btn => btn.classList.remove('active'));
    document.querySelectorAll('#levelRow .cat-btn').forEach(btn => {
      const onClick = btn.getAttribute('onclick') || '';
      if (onClick.includes(`'${level}'`)) btn.classList.add('active');
    });
    filterTerms();
  }

  function updateStats(count) {
    const el = document.getElementById('resultCount');
    if (el) el.textContent = count + ' مصطلح';
  }

  // Initial render
  document.addEventListener('DOMContentLoaded', () => {
    renderTerms(GlossaryData.terms);
    // Update hero subtitle with total
    const heroP = document.querySelector('.page-hero-content p');
    if (heroP) heroP.textContent = 'فرنسي ↔ عربي | ' + GlossaryData.terms.length + ' مصطلح علمي للبكالوريا';
  });
</script>
</body>
</html>
