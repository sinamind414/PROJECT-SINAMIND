<html lang="ar" dir="rtl">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Cairo:wght@800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/bac-tools.css">
  <link rel="stylesheet" href="../css/print-styles.css">
  <link rel="stylesheet" href="../css/chatbot.css">
  <link rel="stylesheet" href="../css/chatbot-enhanced.css">
</head>
<body>

<nav class="bac-navbar">
  <a href="../index.html" class="bac-navbar-logo">🧠 خوارزمي IA</a>
  <ul class="bac-navbar-links">
    <li><a href="methodologie-bac.html">📝 المنهجية</a></li>
    <li><a href="banque-questions.html" class="active">❓ بنك الأسئلة</a></li>
    <li><a href="examen-simule.html">🎓 امتحان تجريبي</a></li>
    <li><a href="statistiques.html">📊 إحصائياتي</a></li>
    <li><a href="erreurs-communes.html">⚠️ أخطاء شائعة</a></li>
    <li><a href="glossaire.html">📖 القاموس</a></li>
  </ul>
</nav>

<header class="page-hero purple">
  <div class="page-hero-content">
    <div class="page-hero-icon">❓</div>
    <h1>بنك أسئلة البكالوريا</h1>
    <p>أسئلة مصنفة حسب المجال والصعوبة مع إجابات نموذجية</p>
  </div>
</header>

<div class="bac-container">

  <div class="question-filters" id="filters">
    <button class="filter-btn active" onclick="filterQuestions('all')">📚 الكل</button>
    <button class="filter-btn" onclick="filterQuestions('proteines')">🧬 البروتينات</button>
    <button class="filter-btn" onclick="filterQuestions('energie')">⚡ الطاقة</button>
    <button class="filter-btn" onclick="filterQuestions('geologie')">🌍 الجيولوجيا</button>
    <button class="filter-btn" onclick="filterQuestions('easy')">🟢 سهل</button>
    <button class="filter-btn" onclick="filterQuestions('medium')">🟡 متوسط</button>
    <button class="filter-btn" onclick="filterQuestions('hard')">🔴 صعب</button>
  </div>

  <div id="questionsList"></div>

</div>

<script src="../js/bac-questions-complete.js"></script>
<script src="../js/print-helper.js"></script>
<script>
  function filterQuestions(filter) {
    document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');

    let questions;
    if (filter === 'all') {
      questions = BACQuestions.questions;
    } else if (['easy', 'medium', 'hard'].includes(filter)) {
      questions = BACQuestions.getByDifficulty(filter);
    } else {
      questions = BACQuestions.getByDomain(filter);
    }

    renderQuestions(questions);
  }

  function renderQuestions(questions) {
    const container = document.getElementById('questionsList');

    if (questions.length === 0) {
      container.innerHTML = '<p style="text-align: center; padding: 40px; color: var(--bac-text-light);">لا توجد أسئلة في هذا التصنيف</p>';
      return;
    }

    container.innerHTML = questions.map(q => `
      <div class="question-card" id="q-${q.id}">
        <div class="question-card-header" onclick="toggleQuestion(${q.id})">
          <div>
            <span class="difficulty-badge ${q.difficulty}">
              ${q.difficulty === 'easy' ? '🟢 سهل' : q.difficulty === 'medium' ? '🟡 متوسط' : '🔴 صعب'}
            </span>
            <span style="margin-right: 10px; font-size: 0.85rem; color: var(--bac-text-light);">${q.unit} • ${q.points} نقاط</span>
          </div>
          <span style="font-size: 1.2rem;">▼</span>
        </div>

        <div style="padding: 20px;">
          <div class="exam-question-text">${q.question}</div>
          ${q.year ? `<span class="exam-question-points">${q.year}</span>` : ''}
        </div>

        <div class="question-card-body" id="answer-${q.id}">
          <div style="padding: 20px; background: #D1FAE5; border-radius: 12px; margin: 0 20px 20px;">
            <strong style="color: #065F46;">✅ الإجابة النموذجية:</strong>
            <p style="margin-top: 8px; white-space: pre-line;">${q.modelAnswer}</p>
          </div>

          <div style="padding: 0 20px 20px;">
            <strong>🔑 الكلمات المفتاحية المطلوبة:</strong>
            <div style="display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px;">
              ${q.keyWords.map(kw => `
                <span style="background: var(--bac-gold-soft); color: var(--bac-gold-dark); padding: 4px 10px; border-radius: 10px; font-size: 0.85rem; font-weight: 600;">
                  ${kw}
                </span>
              `).join('')}
            </div>
          </div>
        </div>
      </div>
    `).join('');
  }

  function toggleQuestion(id) {
    const card = document.getElementById('q-' + id);
    card.classList.toggle('open');
  }

  renderQuestions(BACQuestions.questions);
</script>

<script src="../js/svt-filter.js"></script>
    <script src="../js/chatbot.js"></script>
</body>
</html>
