<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>النشاط التكتوني والبنيات الجيولوجية | علوم وحياة BAC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&family=Cairo:wght@600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/unit-detail.css">
</head>
<body id="unitBody">

  <div class="unit-breadcrumb">
    <div class="breadcrumb-inner" id="breadcrumbContainer">
      <a href="../../index.html" class="breadcrumb-link">🏠 الرئيسية</a>
      <span class="breadcrumb-sep">‹</span>
      <a href="#" class="breadcrumb-link" id="breadcrumbDomain"></a>
      <span class="breadcrumb-sep">‹</span>
      <span class="breadcrumb-active" id="breadcrumbUnit"></span>
    </div>
  </div>

  <section class="unit-hero-section" id="heroSection">
    <div class="unit-hero-inner">
      <div class="unit-hero-text">
        <div class="unit-hero-badge" id="heroBadge"></div>
        <h1 class="unit-hero-title" id="heroTitle"></h1>
        <p class="unit-hero-subtitle" id="heroSubtitle"></p>
        <div class="unit-hero-meta" id="heroMeta"></div>
      </div>
      <div class="unit-hero-visual" id="heroVisual"></div>
    </div>
  </section>

  <div class="unit-layout">
    <aside class="sidebar-toc" id="sidebarToc">
      <div class="sidebar-title">📑 فصول الوحدة</div>
      <div id="sidebarLinks"></div>
    </aside>
    <main class="unit-content" id="unitContent"></main>
  </div>

  <div class="unit-footer-nav" id="unitFooterNav"></div>

  <footer class="site-footer">
    <p>© 2026 Khawarizmi IA — منصة تعليمية ذكية لعلوم الحياة والأرض 🌱</p>
  </footer>

  <script src="../../js/page-generator.js"></script>
  <script src="../../js/unit-page.js"></script>
  <script>
    (function() {
      var UNIT_ID = 'unit-3-3';
      var DOMAIN_NAMES = {
        1: { nameAr: 'المجال 1 — البروتينات والاتصال العصبي', nameFr: 'Domaine 1 — Protéines et Communication Nerveuse' },
        2: { nameAr: 'المجال 2 — تحويل الطاقة', nameFr: 'Domaine 2 — Conversion d\'Énergie' },
        3: { nameAr: 'المجال 3 — النشاط التكتوني', nameFr: 'Domaine 3 — Activité Tectonique' }
      };
      var data = PAGE_CONTENT[UNIT_ID];
      if (!data) { document.getElementById('unitContent').innerHTML = '<div style="text-align:center;padding:100px 20px;font-size:1.2rem;">⚠️ لم يتم العثور على بيانات هذه الوحدة</div>'; return; }
      document.body.dataset.unitId = UNIT_ID;
      document.getElementById('pageTitle').textContent = data.unit.titleAr + ' | علوم وحياة BAC';
      var domainName = DOMAIN_NAMES[data.domain.num];
      document.getElementById('breadcrumbDomain').textContent = domainName.nameAr;
      document.getElementById('breadcrumbUnit').textContent = data.unit.titleAr;
      document.getElementById('heroBadge').innerHTML = data.domain.icon + ' ' + domainName.nameAr + ' — الوحدة ' + data.unit.num;
      document.getElementById('heroSection').style.background = data.domain.gradient;
      document.getElementById('heroTitle').textContent = data.unit.titleAr;
      document.getElementById('heroSubtitle').textContent = data.unit.titleFr;
      document.getElementById('heroMeta').innerHTML = '<span class="hero-meta-chip">📄 الصفحات ' + data.pages + '</span><span class="hero-meta-chip">' + data.chapters.length + ' فصول</span>';
      document.getElementById('heroVisual').textContent = data.unit.icon;
      var gen = generateUnitPage(UNIT_ID);
      document.getElementById('sidebarLinks').innerHTML = gen.sidebarHTML;
      document.getElementById('unitContent').innerHTML = gen.chaptersHTML;
      document.getElementById('unitFooterNav').innerHTML = gen.prevHTML + gen.nextHTML;
      if (typeof UnitPage !== 'undefined') { UnitPage.init(); }
    })();
  </script>
</body>
</html>
