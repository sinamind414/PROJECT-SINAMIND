# .pre-commit-config.yaml — Khawarizmi Pro
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: no-commit-to-branch
        args: [--branch, main]
      - id: check-added-large-files
        args: [--maxkb=500]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.0
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        types_or: [python, pyi]
      - id: ruff-format
        types_or: [python, pyi]

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        types_or: [javascript, jsx, typescript, tsx, json, markdown, css, yaml]
        args: [--print-width=100, --tab-width=2, --single-quote]

  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v9.20.0
    hooks:
      - id: eslint
        types_or: [javascript, jsx, typescript, tsx]
        args: [--fix]
        additional_dependencies:
          - eslint@9
          - typescript-eslint@8
          - '@typescript-eslint/parser@8'
          - '@typescript-eslint/eslint-plugin@8'

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        args: [--severity=warning]
        types: [shell]

  - repo: local
    hooks:
      - id: no-env-committed
        name: Verifier .env non commite
        entry: bash -c '! git ls-files | grep -E "^\.env$|^.*/\.env$"'
        language: system
        pass_filenames: false
      - id: main-py-size
        name: Verifier main.py <= 110 lignes
        entry: bash -c 'test $(wc -l < khawarizmi-backend/main.py) -le 110'
        language: system
        pass_filenames: false
